var extIcons={py:'🐍 Python',sql:'🗄️ SQL',md:'📝 Markdown'};
function extOf(f){var p=f.split('.');return p[p.length-1]}

// ===== SWITCH TAB =====
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.track===id)});
  var t=T[id];if(!t)return;
  var el=document.getElementById('tabContent');
  var days=Object.keys(t.f).sort(function(a,b){return a-b});
  var total=days.length;
  
  var html='<div class="track-title"><span style="font-size:32px">'+t.i+'</span><span>'+t.n+'</span><span class="sub">'+t.d+' — '+total+' lessons</span></div>';
  html+='<div class="quick-stats"><div class="qs-card total"><div class="qs-num">'+total+'</div><div class="qs-label">📚 Lessons</div></div>';
  html+='<div class="qs-card done"><div class="qs-num">0</div><div class="qs-label">✅ Completed</div></div>';
  html+='<div class="qs-card"><div class="qs-num" style="color:var(--accent)">0%</div><div class="qs-label">🎯 Progress</div></div></div>';
  html+='<div class="progress-bar"><div class="progress-fill" style="width:0%;background:'+t.c+'"></div></div>';
  html+='<div class="day-grid">';
  
  for(var i=0;i<days.length;i++){
    var dn=days[i];
    var fp=t.b+t.f[dn];
    var ext=extOf(t.f[dn]);
    var label=t.l[i]||'Day '+dn;
    html+='<a class="day-card" href="lesson.html?file='+fp+'" target="_blank">';
    html+='<div class="day-num">📅 Day '+dn+'</div>';
    html+='<div class="day-label">'+label+'</div>';
    html+='<div class="file-icon">'+ (extIcons[ext]||'📄') +'</div>';
    html+='</a>';
  }
  html+='</div>';
  el.innerHTML=html;
}
