function genDays(trackId,total){
  const days=[];
  const topics={cfa:['Ethics: Standards','Quant: TVM/DCF','Stats/Distributions','Sampling','Econ: Micro/Macro','Econ: Policy/FX','FSA: Statements','FSA: Ratios','Corporate Finance','Equity: DDM/FCF','Fixed Income','Derivatives','Alternatives','Portfolio Mgmt','Mock Exams'],english:['Interview Basics','STAR Method','Tech Vocab','Mock Interview','Email Writing','Presentation','Negotiation','C-Level Speech'],excel:['Pivot Tables','VLOOKUP/XLOOKUP','Charts','Power Query','Macros','Dashboard','Formulas','Project'],stats:['Descriptive','Probability','Normal Dist','Hypothesis','Correlation','Regression','ANOVA','Project'],git:['Git Intro','Commands','Branching','GitHub','PRs','Workflow','Project'],ds:['Python Recap','EDA','Viz','Cleaning','Regression','Classification','Clustering','Project'],ml:['Regression','Trees','Ensemble','SVM/KNN','Clustering','NLP','Time Series','Capstone'],dl:['NN Basics','CNN','RNN/LSTM','GANs','Transformers','RL','Capstone']};
  const t=topics[trackId]||['Day '+i];
  const labels=['','Basics','Advanced','Practice','Review','Project','Capstone','Final'];
  for(let i=1;i<=total;i++){
    const ti=t[(i-1)%t.length];
    const label=labels[(i-1)%labels.length];
    days.push({n:i,f:'',l:ti+' — '+label,t:'Day '+i+' of '+total});
  }
  return days;
}

// ===== SWITCH TAB =====
let currentTrack='python';

function switchTab(trackId){
  currentTrack=trackId;
  // Update active tab
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.track===trackId));
  renderTrack(trackId);
}

// ===== RENDER TRACK =====
function renderTrack(trackId){
  const t=TRACKS[trackId];
  if(!t)return;
  const el=document.getElementById('tabContent');
  const total=t.files.length;
  
  // Stats
  let done=0;
  t.files.forEach(f=>{if(f.status==='done')done++});
  const pct=total>0?Math.round(done/total*100):0;
  
  let html=`
    <div class="track-title"><span class="icon">${t.icon}</span><span class="name">${t.name}</span><span class="sub">${t.subtitle} — ${total} lessons</span></div>
    <div class="quick-stats">
      <div class="qs-card total"><div class="qs-num">${total}</div><div class="qs-label">📚 Total Lessons</div></div>
      <div class="qs-card done"><div class="qs-num">${done}</div><div class="qs-label">✅ Completed</div></div>
      <div class="qs-card" style="border-color:rgba(0,212,255,0.1)"><div class="qs-num" style="color:var(--accent)">${pct}%</div><div class="qs-label">🎯 Progress</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${t.color}"></div></div>
    <div class="day-grid">
  `;
  
  t.files.forEach(f=>{
    const filePath=t.base+f.f;
    const ext=filePath.split('.').pop();
    const extIcons={py:'🐍',sql:'🗄️',md:'📝'};
    html+=`
      <a class="day-card" href="lesson.html?file=${filePath}" target="_blank">
        <div class="day-num">Day ${f.n}</div>
        <div class="day-label">${f.l}</div>
        <div class="day-desc">${f.t||''}</div>
        <div class="file-icon">${extIcons[ext]||'📄'} .${ext}</div>
      </a>
    `;
  });
  
  html+=`</div>`;
  el.innerHTML=html;
}

// ===== INIT =====
switchTab('python');
