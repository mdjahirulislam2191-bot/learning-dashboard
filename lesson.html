// Load file list dynamically for CFA/English/others
async function loadFileLists() {
  for(const [id, track] of Object.entries(TRACKS)) {
    if(track.files.length > 0) continue; // Already have file list
    try {
      const trackData = window.__trackData && window.__trackData[id];
      if(trackData && trackData.files) {
        track.files = trackData.files;
      }
    } catch(e) { /* fallback to empty */ }
  }
}

// ===== PARSE URL =====
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { file: p.get('file'), track: p.get('track'), day: parseInt(p.get('day')) };
}

// ===== FIND FILE IN TRACK =====
function findFile(trackId, dayNum) {
  const t = TRACKS[trackId];
  if(!t) return null;
  return t.files.find(f => f.n === dayNum) || null;
}

// ===== GET FILE LISTING (for tracks without embedded lists) =====
async function getFileList(trackId) {
  const t = TRACKS[trackId];
  if(!t) return [];
  if(t.files.length > 0) return t.files;
  // Generate from pattern
  const files = [];
  const totalDays = {cfa:60, english:24, excel:12, stats:10, git:8, ds:30, ml:60, dl:60};
  const maxDay = totalDays[trackId] || 30;
  for(let i = 1; i <= maxDay; i++) {
    files.push({n:i, f:'day'+String(i).padStart(2,'0')+'_*.md', l:'Day '+i});
  }
  return files;
}

// ===== DETECT TRACK FROM FILE PATH =====
function detectTrack(filePath) {
  for(const [id, t] of Object.entries(TRACKS)) {
    if(filePath.startsWith(t.base) || filePath.startsWith(id.toLowerCase())) return id;
  }
  if(filePath.startsWith('Python/')||filePath.startsWith('python/')) return 'python';
  return null;
}

// ===== LOAD & DISPLAY LESSON =====
async function loadLesson() {
  const params = getParams();
  const contentEl = document.getElementById('mainContent');
  const trackLabel = document.getElementById('trackLabel');

  // Determine file to load
  let filePath = params.file;
  let trackId = params.track || detectTrack(filePath);
  let dayNum = params.day;

  if(!filePath && trackId && dayNum) {
    const t = TRACKS[trackId];
    if(t) {
      const files = await getFileList(trackId);
      const found = files.find(f => f.n === dayNum);
      if(found) filePath = t.base + found.f.replace('_*.md','');
    }
  }

  if(!filePath) {
    contentEl.innerHTML = '<div class="error-state"><h2>📭 লেসন পাওয়া যায়নি</h2><p>URL-এ লেসনের পাথ দিন।<br><a href="index.html" style="color:var(--accent)">← Dashboard-এ ফিরুন</a></p></div>';
    return;
  }

  // Clean filePath - remove asterisks
  filePath = filePath.replace(/_*\*.md$/, '.md');

  // Set track label
  trackLabel.textContent = trackId ? (TRACKS[trackId]?.name || trackId) : '';

  try {
    const resp = await fetch(filePath);
    if(!resp.ok) throw new Error('Not found');
    const raw = await resp.text();

    // Detect if it's code (.py, .sql) or markdown
    const isCode = filePath.endsWith('.py') || filePath.endsWith('.sql');
    const ext = filePath.split('.').pop();

    // Parse day number from filename
    const dayMatch = filePath.match(/day(\d+)/);
    const dayNum = dayMatch ? parseInt(dayMatch[1]) : null;

    // Build lesson header
    let dayLabel = '';
    if(dayNum && trackId && TRACKS[trackId]) {
      const t = TRACKS[trackId];
      const files = await getFileList(trackId);
      const found = files.find(f => f.n === dayNum);
      dayLabel = found ? found.l : 'Day '+dayNum;
    }

    // Render
    let body = '';
    if(isCode) {
      // Code file - wrap in code block
      const lang = ext === 'py' ? 'python' : 'sql';
      body = `
        <div class="lesson-header">
          <div class="track-badge" style="background:${TRACKS[trackId]?.color || '#333'}22;color:${TRACKS[trackId]?.color || '#fff'}">${TRACKS[trackId]?.name || trackId || ''}</div>
          <h1><span class="day-num">Day ${dayNum}</span>: ${dayLabel || filePath.split('/').pop()}</h1>
          <div class="meta">📁 ${filePath}</div>
        </div>
        <div class="lesson-content">
          <pre><code class="language-${lang}">${escapeHtml(raw)}</code></pre>
        </div>`;
    } else {
      // Markdown file - try rendering
      body = `
        <div class="lesson-header">
          <div class="track-badge" style="background:${TRACKS[trackId]?.color || '#333'}22;color:${TRACKS[trackId]?.color || '#fff'}">${TRACKS[trackId]?.name || trackId || ''}</div>
          <h1><span class="day-num">Day ${dayNum}</span>: ${dayLabel || filePath.split('/').pop()}</h1>
          <div class="meta">📁 ${filePath}</div>
        </div>
        <div class="lesson-content" id="mdContent"></div>`;
    }

    contentEl.innerHTML = body;

    // Render markdown if needed
    if(!isCode) {
      // Simple markdown renderer
      const mdEl = document.getElementById('mdContent');
      mdEl.innerHTML = simpleRenderMarkdown(raw.split('\n').slice(1).join('\n')); // Skip first title
      // Apply syntax highlighting
      mdEl.querySelectorAll('pre code').forEach(block => {
        try { hljs.highlightElement(block); } catch(e) {}
      });
    }

    // Setup navigation
    setupNav(filePath, trackId, dayNum);

  } catch(e) {
    contentEl.innerHTML = `<div class="error-state">
      <h2>⚠️ "${filePath}" লোড করা যায়নি</h2>
      <p>লেসন ফাইলটি GitHub-এ আপলোড নাও থাকতে পারে।</p>
      <a href="index.html" style="color:var(--accent);text-decoration:none">← Dashboard-এ ফিরুন</a>
    </div>`;
    console.error('Lesson load error:', e);
  }
}

// ===== NAVIGATION =====
async function setupNav(filePath, trackId, dayNum) {
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  if(!trackId || !dayNum || !TRACKS[trackId]) {
    prevBtn.style.opacity='0.4'; prevBtn.style.pointerEvents='none';
    nextBtn.style.opacity='0.4'; nextBtn.style.pointerEvents='none';
    return;
  }

  const files = await getFileList(trackId);
  const idx = files.findIndex(f => f.n === dayNum);

  if(idx > 0) {
    const prev = files[idx-1];
    const prevPath = TRACKS[trackId].base + prev.f.replace('_*.md','.md').replace('_*','');
    prevBtn.href = 'lesson.html?file='+prevPath;
    prevBtn.style.opacity='1'; prevBtn.style.pointerEvents='auto';
  }
  if(idx < files.length - 1) {
    const next = files[idx+1];
    const nextPath = TRACKS[trackId].base + next.f.replace('_*.md','.md').replace('_*','');
    nextBtn.href = 'lesson.html?file='+nextPath;
    nextBtn.style.opacity='1'; nextBtn.style.pointerEvents='auto';
  }
}

// ===== SIMPLE MARKDOWN RENDERER =====
function simpleRenderMarkdown(md) {
  let html = '';
  let inCode = false;
  let codeBuf = [];
  let codeLang = '';
  let inTable = false;

  const lines = md.split('\n');
  for(let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Code blocks
    if(line.startsWith('```')) {
      if(!inCode) {
        inCode = true;
        codeLang = line.slice(3).trim();
        codeBuf = [];
        continue;
      } else {
        inCode = false;
        html += '<pre><code class="language-'+(codeLang||'')+'">'+escapeHtml(codeBuf.join('\n'))+'</code></pre>\n';
        continue;
      }
    }
    if(inCode) { codeBuf.push(line); continue; }

    // HTML comments
    if(line.match(/^\s*<!--/)) continue;

    // Empty line
    if(line.trim() === '') { html += '\n'; continue; }

    // Headings
    if(line.startsWith('### ')) { html += '<h4>'+escapeInline(line.slice(4))+'</h4>\n'; continue; }
    if(line.startsWith('## ')) { html += '<h3>'+escapeInline(line.slice(3))+'</h3>\n'; continue; }
    if(line.startsWith('# ')) { html += '<h2>'+escapeInline(line.slice(2))+'</h2>\n'; continue; }

    // Horizontal rule
    if(line.match(/^---+/)) { html += '<hr>\n'; continue; }

    // Blockquote
    if(line.startsWith('> ')) { html += '<blockquote>'+escapeInline(line.slice(2))+'</blockquote>\n'; continue; }

    // Unordered list
    if(line.match(/^[\s]*[-*]\s/)) {
      const text = line.replace(/^[\s]*[-*]\s/, '');
      html += '<li>'+escapeInline(text)+'</li>\n';
      // Check if next line is also a list item
      if(i+1 < lines.length && !lines[i+1].match(/^[\s]*[-*]\s/) && !html.endsWith('</ul>\n')) {
        // Don't wrap in <ul> for simplicity
      }
      continue;
    }

    // Ordered list
    if(line.match(/^\d+\.\s/)) {
      const text = line.replace(/^\d+\.\s/, '');
      html += '<li>'+escapeInline(text)+'</li>\n';
      continue;
    }

    // Table
    if(line.includes('|')) {
      if(line.match(/^\|.*\|$/)) {
        if(!inTable) {
          inTable = true;
          html += '<table>\n';
        }
        if(line.match(/^\|[\s:-]+\|/)) continue; // Skip separator row
        const cells = line.split('|').filter(c => c.trim() !== '');
        html += '<tr>';
        cells.forEach(c => html += '<td>'+escapeInline(c.trim())+'</td>');
        html += '</tr>\n';
        continue;
      }
    } else if(inTable) {
      html += '</table>\n';
      inTable = false;
    }

    // Regular paragraph
    html += '<p>'+escapeInline(line)+'</p>\n';
  }
  if(inCode) html += '<pre><code>'+escapeHtml(codeBuf.join('\n'))+'</code></pre>\n';
  if(inTable) html += '</table>\n';

  // Clean up consecutive </p>\n<p> from adjacent list items
  html = html.replace(/<\/li>\n<p>/g, '</li>\n');
  html = html.replace(/<\/p>\n<li>/g, '\n<li>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');

  return html;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeInline(text) {
  text = escapeHtml(text);
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  text = text.replace(/`(.+?)`/g, '<code>$1</code>');
  // Links
  text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
  return text;
}

  loadLesson();
